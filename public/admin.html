<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body { margin:0; font-family: Arial; display:flex; }
.sidebar {
  width:220px;
  height:100vh;
  background:#2c3e50;
  color:white;
  padding:20px;
}
.sidebar h2 { text-align:center; }
.sidebar ul { list-style:none; padding:0; }
.sidebar li { padding:10px; cursor:pointer; }
.sidebar li:hover { background:#34495e; }

.main {
  flex:1;
  padding:30px;
  background:#ecf0f1;
}

.card {
  background:white;
  padding:20px;
  border-radius:8px;
  margin-bottom:20px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>ADMIN</h2>
  <ul>
    <li>Dashboard</li>
    <li>Users</li>
    <li>Products</li>
    <li><a href="/logout" style="color:white;text-decoration:none;">Logout</a></li>
  </ul>
</div>

<div class="main">
  <h1>Dashboard</h1>
<h2>Danh sách DSD</h2>

<div class="card">
  <table border="1" width="100%" cellpadding="8" style="border-collapse:collapse;">
    <thead style="background:#34495e;color:white;">
      <tr>
        <th>STT</th>
        <th>Tên</th>
        <th>Nhóm</th>
        <th>Vé cấp 1</th>
        <th>Vé cấp 2</th>
        <th>Vé tổng</th>
        <th>Nguồn</th>
        <th>Ngày</th>
      </tr>
    </thead>
    <tbody id="dsdList"></tbody>
  </table>
</div>

<script>
async function loadDSD(){
  try {
    const res = await fetch("/api/dsd");
    const data = await res.json();

    if(!Array.isArray(data)){
      console.log(data);
      return;
    }

    document.getElementById("dsdList").innerHTML =
      data.map(d => `
        <tr>
          <td>${d.stt}</td>
          <td>${d.ten}</td>
          <td>${d.nhom}</td>
          <td>${d.vecap1}</td>
          <td>${d.vecap2}</td>
          <td>${d.vetong}</td>
          <td>${d.nguon}</td>
          <td>${d.ngay}</td>
        </tr>
      `).join("");

  } catch(err){
    console.log("Lỗi load DSD:", err);
  }
}

loadDSD();
</script>
  <div class="card">
    <h3>Thống kê</h3>
    <p>Chào mừng bạn đến trang quản lý.</p>
  </div>

</div>

</body>
</html>
